name: Odds Ingestion

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  odds-ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: https://ohykyscckijbphenugkb.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_jV3R6BovyhHyFIcQ9PNF9Q_HV-fDqBo
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Show workflow context
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF_NAME"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate ingestion RPC env
        run: |
          test -n "$ODDS_API_KEY" || (echo "Missing secret: ODDS_API_KEY" && exit 1)
          test -n "$SUPABASE_PUBLISHABLE_KEY" || (echo "Missing SUPABASE_PUBLISHABLE_KEY" && exit 1)
          python - <<'PY'
          from app.config import get_settings
          settings = get_settings()
          assert settings.odds_api_key, 'Settings did not receive ODDS_API_KEY'
          assert settings.supabase_publishable_key, 'Settings did not receive SUPABASE_PUBLISHABLE_KEY'
          print('Odds ingestion env validated in Python settings')
          PY
      - name: Run odds ingestion
        run: python -m workers.odds_ingestion
