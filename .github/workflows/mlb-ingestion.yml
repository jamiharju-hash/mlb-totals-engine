name: MLB Data Ingestion

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  mlb-ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Show workflow context
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF_NAME"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_URL" || (echo "Missing secret: SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          python - <<'PY'
          from app.config import get_settings
          settings = get_settings()
          assert settings.supabase_url, 'Settings did not receive SUPABASE_URL'
          assert settings.supabase_service_role_key, 'Settings did not receive SUPABASE_SERVICE_ROLE_KEY'
          print('Supabase env validated in Python settings')
          PY
      - name: Run MLB ingestion
        run: python -m workers.mlb_ingestion
