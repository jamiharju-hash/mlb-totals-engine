name: MLB Data Ingestion

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  mlb-ingestion:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: https://ohykyscckijbphenugkb.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_jV3R6BovyhHyFIcQ9PNF9Q_HV-fDqBo
    steps:
      - uses: actions/checkout@v4
      - name: Show workflow context
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF_NAME"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate ingestion RPC env
        run: |
          echo "SUPABASE_URL configured for project ohykyscckijbphenugkb"
          test -n "$SUPABASE_PUBLISHABLE_KEY" || (echo "Missing SUPABASE_PUBLISHABLE_KEY" && exit 1)
          python - <<'PY'
          from app.config import get_settings
          settings = get_settings()
          assert settings.supabase_url == 'https://ohykyscckijbphenugkb.supabase.co', 'Unexpected SUPABASE_URL'
          assert settings.supabase_publishable_key, 'Settings did not receive SUPABASE_PUBLISHABLE_KEY'
          print('Supabase ingestion RPC env validated in Python settings')
          PY
      - name: Run MLB ingestion
        run: python -m workers.mlb_ingestion
